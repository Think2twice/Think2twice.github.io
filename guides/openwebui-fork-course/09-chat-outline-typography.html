<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>09. 长对话要有用户问题大纲</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<nav class="topnav">
			<a href="./index.html">课程首页</a>
			<span>09. 长对话要有用户问题大纲</span>
		</nav>

		<main class="article">
			<p class="eyebrow">Chat Reading</p>
			<h1>复盘入口应该跟着问题走</h1>
			<p class="lead">
				这一课对应聊天阅读体验提交：用用户问题生成右侧大纲，并把正文标题排版调成适合长期阅读的工作文档密度。
			</p>

			<section class="diagram-card">
				<svg class="outline-map" viewBox="0 0 900 330" role="img" aria-label="chat outline map">
					<rect class="outline-page" x="70" y="45" width="560" height="240" rx="8" />
					<g class="outline-message" transform="translate(110 82)">
						<rect width="360" height="34" rx="8" />
						<text x="18" y="23">用户问题 1</text>
					</g>
					<g class="outline-message outline-message--answer" transform="translate(170 132)">
						<rect width="400" height="56" rx="8" />
						<text x="18" y="34">助手回答...</text>
					</g>
					<g class="outline-message" transform="translate(110 208)">
						<rect width="380" height="34" rx="8" />
						<text x="18" y="23">用户问题 2</text>
					</g>
					<g class="outline-rail" transform="translate(710 70)">
						<line x1="90" y1="0" x2="90" y2="190" />
						<rect x="0" y="18" width="150" height="30" rx="8" />
						<rect x="0" y="126" width="150" height="30" rx="8" />
						<text x="75" y="38">1. 用户问题</text>
						<text x="75" y="146">2. 用户问题</text>
					</g>
				</svg>
			</section>

			<section>
				<h2>核心判断</h2>
				<p>
					聊天复盘的导航应该按“用户要解决的问题”组织。助手标题适合正文内部阅读，用户问题才是回到某一轮上下文的入口。
				</p>
			</section>

			<section>
				<h2>三个落点</h2>
				<div class="split-grid">
					<div class="mini-panel">
						<h3>用户轮次</h3>
						<p>只抓用户消息，生成最多 60 条短标题。</p>
					</div>
					<div class="mini-panel">
						<h3>宽屏悬停</h3>
						<p>默认显示短横线，hover 后展开标题，避免长期遮挡正文。</p>
					</div>
					<div class="mini-panel">
						<h3>稳定排版</h3>
						<p>标题字号固定，不随视口线性缩放，正文更容易扫读。</p>
					</div>
					<div class="mini-panel">
						<h3>轻量增强</h3>
						<p>大纲不改变消息数据结构，只是阅读辅助层。</p>
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
