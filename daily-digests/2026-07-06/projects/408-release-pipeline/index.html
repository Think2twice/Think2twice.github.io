<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>408 正式站发布流水线</title><style>body{margin:0;background:#fbfaf6;color:#24211d;font:16px/1.72 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.wrap{max-width:1080px;margin:auto;padding:28px 18px 60px}a{color:#315f86;text-decoration:none;border-bottom:1px solid rgba(49,95,134,.3)}.card{border:1px solid #ddd4c5;background:#fffdf8;border-radius:8px;padding:18px;margin:14px 0}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.step{border-top:4px solid #2f6f6a;background:#f8f2e8;padding:12px;border-radius:6px}h1{font-size:34px;line-height:1.15;margin:8px 0 12px}.muted{color:#6b655c}code{background:#f3eadb;border:1px solid #ddd4c5;padding:1px 4px;border-radius:4px}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><p><a href="../../">返回 2026-07-06 总账</a></p><h1>408 正式站发布流水线</h1><p class="muted">补充页把四科源内容、题库、legacy 做题页和正式站验收放进同一张发布图。</p><section class="grid"><div class="step"><strong>源侧输入</strong><br>四科 README、题库、图片、错题总结。</div><div class="step"><strong>同步</strong><br>`sync` 推入站点目录。</div><div class="step"><strong>门禁</strong><br>公式、媒体、链接、legacy 资源。</div><div class="step"><strong>构建</strong><br>VitePress 输出 dist。</div><div class="step"><strong>部署</strong><br>发布到正式站目录。</div><div class="step"><strong>证明</strong><br>抽样新变更页面，不用旧首页 200 替代。</div></section><section class="card"><h2>7 月 6 日的意义</h2><p>失败与成功都要保留：第一次 legacy 门禁失败暴露构建输出风险，后续完整部署成功证明恢复链可行。下一步应减少并行 worker 对共享输出目录的影响。</p></section></main></body></html>
