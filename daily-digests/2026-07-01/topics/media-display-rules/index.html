<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>视频黑边与显示策略</title><style>:root{--paper:#fbfaf6;--ink:#25231f;--muted:#6d675d;--line:#ded6c8;--soft:#f1ebdf;--card:#fffdf8;--green:#2f6f5e;--blue:#315f86;--gold:#9b762f;--red:#954c42}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(90deg,rgba(49,95,134,.045) 1px,transparent 1px),linear-gradient(0deg,rgba(47,111,94,.04) 1px,transparent 1px),var(--paper);background-size:28px 28px;color:var(--ink);font:16px/1.72 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
a{color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(49,95,134,.28)}.wrap{max-width:1160px;margin:0 auto;padding:28px 20px 64px}
header{border:1px solid var(--line);background:rgba(255,253,248,.95);padding:24px}.eyebrow{color:var(--green);font-weight:800;font-size:13px}.lead{font-size:18px;color:var(--muted);max-width:860px}
h1{margin:6px 0 10px;font-size:clamp(30px,5vw,50px);line-height:1.08;letter-spacing:0}h2{margin:0 0 10px;font-size:22px;letter-spacing:0}h3{margin:0 0 8px;font-size:18px;letter-spacing:0}
nav{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px}nav a,.pill{border:1px solid var(--line);background:var(--card);padding:8px 10px;color:var(--ink)}
.paper,.card,.ledger-item{border:1px solid var(--line);background:rgba(255,253,248,.96);padding:16px;margin-top:14px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.two{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.quick{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:18px}
.metric{border:1px solid var(--line);background:var(--soft);padding:14px}.metric b{display:block;font-size:28px;color:var(--green);line-height:1}.metric span,.small{color:var(--muted);font-size:14px}
.ledger{display:grid;gap:10px}.ledger-item{display:grid;grid-template-columns:96px 1fr 116px;gap:12px;align-items:start;margin-top:0}.time{font-weight:800;color:var(--green);font-size:14px}.status{justify-self:end;color:var(--muted);font-size:13px;border:1px solid var(--line);padding:3px 8px;background:var(--soft);white-space:nowrap}.tag{display:inline-block;color:var(--muted);font-size:13px;margin-right:6px}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line)}th,td{border:1px solid var(--line);padding:10px;vertical-align:top;text-align:left}th{background:var(--soft)}
.map{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}.stage{border:1px solid var(--line);background:var(--card);padding:12px;min-height:112px}.stage.current{border-color:var(--green);box-shadow:inset 0 4px 0 var(--green)}.stage.warn{border-color:var(--gold);box-shadow:inset 0 4px 0 var(--gold)}
.warnline{border-left:4px solid var(--red)}.okline{border-left:4px solid var(--green)}code{background:var(--soft);padding:2px 5px;border:1px solid var(--line)}footer{margin-top:44px;color:var(--muted);font-size:14px}
@media (max-width:860px){.grid,.two,.quick,.map{grid-template-columns:1fr}.ledger-item{grid-template-columns:1fr}.status{justify-self:start}}</style></head><body><div class="wrap"><header><div class="eyebrow">每日全景复盘 / 2026-07-01</div><h1>视频黑边与显示策略</h1><p class="lead">同一份 16:9 视频在不同播放器里可能完整显示或裁切填满，先判断比例与显示策略，再决定是否调整播放器。</p><nav><a href="../../">返回总账</a></nav></header><main><section class="paper"><h2>触发</h2><p>同一个视频云盘播放满屏，本地下载播放有上下黑边。</p></section><section class="paper"><h2>动作</h2><p>先查视频分辨率和有效画面，再比较屏幕比例与播放器显示策略。</p></section><section class="paper"><h2>验证</h2><p>16:9 视频在更高比例屏幕上完整显示会留黑边；云盘满屏通常是裁切放大。</p></section></main><footer>公开版本已脱敏：不写真实服务器资产、账号、凭据、私密聊天原文和不必要环境细节。</footer></div></body></html>
