<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>XPS 文件求助：先补上下文</title><style>:root{--paper:#fbfaf7;--ink:#202124;--muted:#69707a;--line:#dedbd2;--soft:#f0eee7;--blue:#2f6f9f;--green:#50715f;--rose:#a65b5b;--gold:#9b783d;--card:#fffefa}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",Segoe UI,sans-serif;line-height:1.68}a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}.wrap{max-width:1160px;margin:0 auto;padding:28px 22px 64px}.top{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;align-items:start;border-bottom:1px solid var(--line);padding-bottom:22px}.eyebrow{font-size:13px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}.h1{font-size:34px;line-height:1.18;margin:10px 0 12px;letter-spacing:0}.lead{font-size:17px;color:#3f4348;max-width:760px}.quick{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px}.quick a{display:block;padding:7px 0;border-bottom:1px dashed #e7e2d8}.quick a:last-child{border-bottom:0}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.metric{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px}.metric b{font-size:27px;display:block}.metric span{color:var(--muted);font-size:13px}.section{padding:32px 0;border-bottom:1px solid var(--line)}h2{font-size:24px;margin:0 0 16px}h3{font-size:17px;margin:20px 0 8px}.ledger{display:grid;gap:10px}.row{display:grid;grid-template-columns:120px 1fr 130px 140px;gap:10px;align-items:start;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px}.tag{display:inline-flex;border:1px solid #d8d2c6;background:#f5f2ea;border-radius:999px;padding:2px 8px;font-size:12px;color:#59606a}.status{font-weight:650}.ok{color:var(--green)}.wait{color:var(--gold)}.block{color:var(--rose)}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px}.card p{margin:8px 0;color:#3f4348}.flow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.step{background:#f6f2e8;border:1px solid #ddd4c5;border-radius:8px;padding:12px;min-height:86px}.step strong{display:block;margin-bottom:6px}.table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden}.table th,.table td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}.table th{background:#f3efe5;font-weight:650}.table tr:last-child td{border-bottom:0}.note{background:#f7f5ef;border-left:4px solid var(--blue);padding:13px 14px;border-radius:6px;color:#3f4348}.small{font-size:13px;color:var(--muted)}.pillbar{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.pill{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 9px}code{background:#f0eee7;border:1px solid #e0d9ca;border-radius:5px;padding:1px 4px}@media(max-width:820px){.top,.grid,.cards,.flow{grid-template-columns:1fr}.row{grid-template-columns:1fr}.wrap{padding:18px 14px 44px}.h1{font-size:28px}}</style></head><body><main class="wrap"><section class="top"><div><div class="eyebrow">Topic</div><h1 class="h1">XPS 文件求助：先补上下文</h1><p class="lead">这类问题的关键不是马上找插件，而是先问清平台、文件来源和最终目标。最自然的标签是“上下文缺失”。</p></div><nav class="quick"><a href="../../">返回总账</a></nav></section><section class="section"><h2>三问模板</h2><div class="flow"><div class="step"><strong>平台</strong>对方是在 Mac、Windows，还是仪器电脑上处理？</div><div class="step"><strong>来源</strong>这个 .xps 是标准文档，还是仪器软件的私有数据？</div><div class="step"><strong>目标</strong>只是查看/打印/转 PDF，还是要重新积分、改峰、导出数据？</div><div class="step"><strong>安全</strong>优先离线转换或让原电脑导出 PDF，不用随机在线转换站。</div></div></section><section class="section"><h2>可复用说法</h2><p class="note">这不是以偏概全，而是上下文缺失：没有说明设备、文件来源和最终想做什么，所以不能判断该找查看器、转换器，还是专业分析软件。</p></section></main></body></html>
