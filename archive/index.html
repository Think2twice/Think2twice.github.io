<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>归档 · 学习教程库</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%2311161d'/%3E%3Cpath d='M18 21h28M18 32h28M18 43h28' stroke='%23f7d36d' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    :root { color-scheme: light; font-family: "Inter", "Avenir Next", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; color: #15191f; background: #fbfaf6; }
    * { box-sizing: border-box; }
    body { margin: 0; background: linear-gradient(90deg, rgba(21,25,31,.035) 1px, transparent 1px) 0 0 / 34px 34px, linear-gradient(rgba(21,25,31,.035) 1px, transparent 1px) 0 0 / 34px 34px, #fbfaf6; line-height: 1.72; }
    a { color: inherit; text-decoration: none; }
    header { border-bottom: 1px solid #e3ded5; background: rgba(251,250,246,.9); }
    nav { width: min(980px, calc(100% - 32px)); min-height: 68px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
    nav a { font-weight: 900; }
    .links { display: flex; gap: 18px; flex-wrap: wrap; font-size: 14px; }
    main { width: min(900px, calc(100% - 32px)); margin: 0 auto; padding: 70px 0; }
    h1 { margin: 0 0 26px; font-size: clamp(42px, 7vw, 76px); line-height: 1.05; }
    .archive { display: grid; gap: 14px; }
    .item { display: grid; grid-template-columns: 120px 1fr auto; gap: 18px; align-items: center; border: 1px solid #e3ded5; background: #fff; border-radius: 10px; box-shadow: 0 18px 45px rgba(21,25,31,.08); padding: 18px; }
    .date { color: #66717f; font-weight: 800; }
    .title { font-size: 20px; font-weight: 900; }
    .tag { color: #5867d8; font-weight: 800; }
    @media (max-width: 640px) { .item { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="../">学习教程库</a>
      <div class="links">
        <a href="../">教程</a>
        <a href="./">归档</a>
        <a href="../guides/github-pages-manual/">GitHub Pages</a>
      </div>
    </nav>
  </header>
  <main>
    <h1>归档</h1>
    <div class="archive" id="archive-list"></div>
  </main>
  <script src="../assets/posts.js"></script>
  <script>
    const posts = window.LEARNING_POSTS || [];
    document.getElementById("archive-list").innerHTML = posts.map((post) => `
      <a class="item" href="${post.archiveUrl}">
        <span class="date">${post.date}</span>
        <span class="title">${post.title}</span>
        <span class="tag">${post.category}</span>
      </a>
    `).join("");
  </script>
</body>
</html>
